# Google Cloud Build - Auto Deploy Configuration
# Hotel Jai Laxmi & Lodge - Node.js App
# Triggered automatically when you push to GitHub main branch

steps:
  # Step 1: Install dependencies
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['install', '--production']

  # Step 2: Deploy to Google Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hotel-jailaxmi:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hotel-jailaxmi:latest'
      - '.'

  # Step 3: Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hotel-jailaxmi:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hotel-jailaxmi:latest']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'hotel-jailaxmi'
      - '--image=gcr.io/$PROJECT_ID/hotel-jailaxmi:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

# Store images in Google Container Registry
images:
  - 'gcr.io/$PROJECT_ID/hotel-jailaxmi:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/hotel-jailaxmi:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY

# Timeout: 20 minutes
timeout: '1200s'
